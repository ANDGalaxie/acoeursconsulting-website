# Select the final paid or team plan in the Render Dashboard if your traffic,
# uptime, or database requirements exceed the default starter tier below.
databases:
  - name: acoeursconsulting-db
    databaseName: acoeursconsulting
    user: acoeursconsulting
    plan: free

services:
  - type: web
    name: acoeursconsulting-web
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: staging.acoeursconsulting.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://staging.acoeursconsulting.com
      - key: SITE_URL
        value: https://staging.acoeursconsulting.com
      - key: SITE_NOINDEX
        value: "true"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: acoeursconsulting-db
          property: connectionString
