{% load static %}
<header class="site-header" data-site-header>
    <div class="container site-header__inner">
        <a class="site-logo" href="{% url 'home' %}" aria-label="Acoeurs Consulting 首页">
            <img
                class="site-logo__image"
                src="{% static 'images/brand/acoeurs-logo.png' %}"
                alt="Acoeurs Consulting"
                width="2302"
                height="2514"
            >
            <span class="site-logo__name" aria-hidden="true">Acoeurs Consulting</span>
        </a>
        <button
            class="nav-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="site-navigation"
            aria-label="打开主导航菜单"
            data-nav-toggle
        >
            <span class="nav-toggle__box" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </span>
            <span class="nav-toggle__label">菜单</span>
        </button>
        <nav class="site-nav" id="site-navigation" aria-label="主导航" data-nav-panel>
            <ul class="site-nav__list">
                <li><a{% if current_nav == 'home' %} aria-current="page"{% endif %} href="{% url 'home' %}">首页</a></li>
                <li><a{% if current_nav == 'business' %} aria-current="page"{% endif %} href="{% url 'business' %}">企业服务</a></li>
                <li><a{% if current_nav == 'personal' %} aria-current="page"{% endif %} href="{% url 'personal' %}">个人服务</a></li>
                <li><a{% if current_nav == 'about' %} aria-current="page"{% endif %} href="{% url 'about' %}">关于我们</a></li>
                <li><a class="button button--primary" href="{% url 'contact' %}">联系我们</a></li>
            </ul>
        </nav>
    </div>
</header>
